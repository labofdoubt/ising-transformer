model:
  L: 120
  patch_r: 3
  patch_c: 4
  hidden_dim: 128
  n_heads: 4
  n_blocks: 1
  use_layernorm: true
  init_std: 0.02
  use_pos_emb: true
  use_ap: true
  beta: 0.44068679350977147
  J: 1.0
  device: cuda
  dtype: float32

train:
  batch_size: 4096
  val_batch_size: 131072
  adam_betas: [0.9, 0.95]
  weight_decay: 0.0
  learning_rate: 0.001
  total_steps: 200000
  use_cosine_scheduler: false
  validate_every_n: 100
  save_logs_every_n: 100
  save_checkpoint_every_n: 5000
  resume_checkpoint: null
  log_dir: runs/ising_l120_3x4_ap
  checkpoint_dir: checkpoints/ising_l120_3x4_ap
  seed: 1234
  grad_clip: null
